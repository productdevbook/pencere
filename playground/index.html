<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pencere playground</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 900px;
        margin: 2rem auto;
        padding: 1rem;
      }
      h1 {
        margin-top: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1rem;
      }
      .grid button {
        padding: 0;
        border: 1px solid #ddd;
        background: none;
        cursor: pointer;
        border-radius: 8px;
        overflow: hidden;
      }
      .grid img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>pencere playground</h1>
    <p>Click any image to open the lightbox.</p>
    <div class="grid" id="gallery"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
