version: 2
updates:
  # npm dependencies — runs weekly, groups minor + patch into a
  # single PR so the queue stays manageable.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions — keep the pinned SHAs fresh so Scorecard stays
  # green without surprising workflow breakages.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
