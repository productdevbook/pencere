name: Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate SRI hashes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HASH=$(shasum -b -a 384 dist/index.mjs | awk '{ print $1 }' | xxd -r -p | base64)
          SRI="sha384-${HASH}"
          echo "### SRI integrity" >> sri.md
          echo "" >> sri.md
          echo '```html' >> sri.md
          echo "<script type=\"module\" src=\"https://cdn.jsdelivr.net/npm/pencere@${VERSION}/dist/index.mjs\" integrity=\"${SRI}\" crossorigin=\"anonymous\"></script>" >> sri.md
          echo '```' >> sri.md
          echo "" >> sri.md
          echo "**\`dist/index.mjs\`:** \`${SRI}\`" >> sri.md
          cat sri.md

      - name: Upload SRI to release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" sri.md --clobber || true
          # Append SRI section to release body
          EXISTING=$(gh release view "${GITHUB_REF_NAME}" --json body -q .body)
          SRI_BODY=$(cat sri.md)
          printf '%s\n\n---\n\n%s' "${EXISTING}" "${SRI_BODY}" | gh release edit "${GITHUB_REF_NAME}" --notes-file -
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
